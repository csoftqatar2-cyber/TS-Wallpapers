name: Build & Publish APK Update

# Automatic delivery pipeline:
#   1. You create a GitHub Release (tag like v1.3) â€” or run this manually.
#   2. This workflow builds the signed "standalone" release APK.
#   3. It attaches the APK to the Release as `TS-Wallpapers.apk`.
#   4. It upserts the Supabase `app_versions` row so every device running
#      an older versionCode is offered the update in-app (UpdateManager).
#
# IMPORTANT before releasing: bump `versionCode` (and `versionName`) in
# source/app/build.gradle and commit it, THEN create the release/tag.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SIGNING_KEYSTORE_BASE64    - base64 of source/thabthaba.jks
#   KEYSTORE_PASSWORD          - keystore store password
#   KEY_ALIAS                  - signing key alias
#   KEY_PASSWORD               - signing key password
#   SUPABASE_SERVICE_ROLE_KEY  - Supabase service_role key (bypasses RLS to write app_versions)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the APK to (e.g. v1.3)"
        required: true

permissions:
  contents: write   # needed to upload the APK asset to the Release

env:
  SUPABASE_URL: https://ihgmqwzdpugdzddobhbc.supabase.co

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > source/thabthaba.jks

      - name: Build signed standalone release APK
        working-directory: source
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleStandaloneRelease --no-daemon --console=plain

      - name: Resolve version + tag
        id: meta
        run: |
          VC=$(grep -oE 'versionCode[[:space:]]+[0-9]+' source/app/build.gradle | grep -oE '[0-9]+' | head -1)
          VN=$(grep -oE 'versionName[[:space:]]+"[^"]+"' source/app/build.gradle | sed -E 's/.*"([^"]+)".*/\1/' | head -1)
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            NOTES="${{ github.event.release.body }}"
          else
            TAG="${{ github.event.inputs.tag }}"
            NOTES="Update to $VN"
          fi
          echo "version_code=$VC" >> "$GITHUB_OUTPUT"
          echo "version_name=$VN" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # multiline changelog -> keep single line to stay JSON-safe
          echo "changelog=$(echo "$NOTES" | tr '\n' ' ' | sed 's/"/\\"/g')" >> "$GITHUB_OUTPUT"
          echo "Building versionCode=$VC versionName=$VN tag=$TAG"

      - name: Rename APK asset
        run: cp "source/app/build/outputs/apk/standalone/release/TS Wallpapers.apk" TS-Wallpapers.apk

      - name: Upload APK to the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.meta.outputs.tag }}" TS-Wallpapers.apk --clobber -R "${{ github.repository }}"

      - name: Publish version row to Supabase (app_versions)
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/TS-Wallpapers.apk"
          # remove any existing row with the same version_code to avoid duplicates
          curl -s -X DELETE \
            "${SUPABASE_URL}/rest/v1/app_versions?version_code=eq.${{ steps.meta.outputs.version_code }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          # insert the fresh row
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{\"version_code\": ${{ steps.meta.outputs.version_code }}, \"version_name\": \"${{ steps.meta.outputs.version_name }}\", \"apk_url\": \"${APK_URL}\", \"changelog\": \"${{ steps.meta.outputs.changelog }}\"}")
          echo "Supabase insert HTTP $HTTP"
          cat /tmp/resp.json
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then exit 1; fi

      - name: Summary
        run: |
          echo "### âś… Published v${{ steps.meta.outputs.version_name }} (code ${{ steps.meta.outputs.version_code }})" >> "$GITHUB_STEP_SUMMARY"
          echo "Users on older builds will now be offered the update in-app." >> "$GITHUB_STEP_SUMMARY"
